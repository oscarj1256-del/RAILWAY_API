<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask MVC - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h1 class="h4 mb-0">Gestión de Clientes</h1>
                    </div>
                    
                    <div class="card-body">
                        <form method="POST" class="mb-4">
                            <div class="input-group">
                                <input type="text" name="name" class="form-control" placeholder="Nombre del Clietne" required>
                                <button class="btn btn-success" type="submit">Agregar Cliente</button>
                            </div>
                        </form>

                        <hr>

                        <h5 class="text-muted">Lista de Clientes</h5>
                        <ul class="list-group">
                            {% for cliente in clientes %}
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    &#129497  {{cliente.name }}
                                </li>
                            {% else %}
                                <li class="list-group-item text-center text-muted">No hay Clientes registrados</li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
